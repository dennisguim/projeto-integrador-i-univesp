{% extends "base.html" %}

{% block title %}Registrar Frequência{% endblock %}

{% block content %}
    <h2>Registrar Frequência: {{ funcionario.nome }}</h2>
    <p>Setor: {{ funcionario.setor.nome }} | SIAPE: {{ funcionario.siape }}</p>

    <form method="post">
        <div>
            <label>Mês de Referência:</label><br>
            <select name="mes" required>
                {% for m in ['JANEIRO', 'FEVEREIRO', 'MARÇO', 'ABRIL', 'MAIO', 'JUNHO', 'JULHO', 'AGOSTO', 'SETEMBRO', 'OUTUBRO', 'NOVEMBRO', 'DEZEMBRO'] %}
                    <option value="{{ m }}" {% if mes_padrao == m %}selected{% endif %}>{{ m }}</option>
                {% endfor %}
            </select>
        </div>
        <br>
        <div>
            <label>Ano:</label><br>
            <input type="number" name="ano" value="{{ ano_padrao if ano_padrao else 2026 }}" required>
        </div>
        <br>
        <div>
            <label>Frequência Integral?</label><br>
            <select name="frequencia_integral">
                <option value="SIM">SIM</option>
                <option value="NÃO">NÃO</option>
                <option value="PARCIAL">PARCIAL</option>
            </select>
        </div>
        <br>
        <div>
            <label>Observações / Ocorrências</label><br>
            <textarea name="observacoes" rows="4" cols="50" placeholder="Licença médica dia 10. Faltas injustificadas nos dias 12 e 13."></textarea>
        </div>
        <br>
        <button type="submit">Salvar Registro</button>
    </form>

    <br>
    <a href="{{ url_for('listar_funcionarios') }}">Voltar</a>
{% endblock %}
