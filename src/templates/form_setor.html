{% extends "base.html" %}

{% block title %}Novo Setor{% endblock %}

{% block content %}
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Cadastrar Novo Setor</h2>
        <a href="{{ url_for('listar_setores') }}"><button type="button">Voltar</button></a>
    </div>

    <form method="post">
        <label>Nome do Setor:</label>
        <input type="text" name="nome" required placeholder="Ex: Divisão de Enfermagem">

        <label>Sigla:</label>
        <input type="text" name="sigla" placeholder="Ex: DIENF">

        <label>Nome da Chefia:</label>
        <input type="text" name="chefia_nome" required>

        <label>Matrícula da Chefia:</label>
        <input type="text" name="chefia_matricula">

        <button type="submit">Salvar Setor</button>
    </form>

    <br>
    <a href="{{ url_for('listar_setores') }}">Cancelar</a>
{% endblock %}
