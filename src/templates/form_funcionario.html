{% extends "base.html" %}

{% block title %}{{ 'Editar' if funcionario else 'Novo' }} Funcionário{% endblock %}

{% block content %}
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>{{ 'Editar Dados de ' + funcionario.nome if funcionario else 'Novo Funcionário' }}</h2>
        <a href="{{ url_for('listar_funcionarios') }}"><button type="button">Voltar</button></a>
    </div>

    <form method="post">
        <label>Nome Completo:</label>
        <input type="text" name="nome" value="{{ funcionario.nome if funcionario }}" required>

        <label>Matrícula SIAPE:</label>
        <input type="text" name="siape" value="{{ funcionario.siape if funcionario }}" required>

        <label>Lotação:</label>
        <input type="text" name="lotacao" value="{{ funcionario.lotacao if funcionario }}" placeholder="Ex: HCIII">

        <label>Setor:</label>
        <select name="setor_id" required>
            {% for setor in setores %}
                <option value="{{ setor.id }}" {{ 'selected' if funcionario and funcionario.setor_id == setor.id }}>
                    {{ setor.nome }}
                </option>
            {% endfor %}
        </select>

        <label>Jornada:</label>
        <input type="text" name="jornada" value="{{ funcionario.jornada if funcionario }}" placeholder="Ex: 40h">

        <label>Escala:</label>
        <input type="text" name="escala" value="{{ funcionario.escala if funcionario }}" placeholder="Ex: 12x36">
        
        <label>Trabalho Remoto Integral?</label>
        <select name="remoto_integral">
            <option value="NÃO" {{ 'selected' if funcionario and funcionario.trabalho_remoto_integral == 'NÃO' }}>NÃO</option>
            <option value="SIM" {{ 'selected' if funcionario and funcionario.trabalho_remoto_integral == 'SIM' }}>SIM</option>
        </select>

        <button type="submit">Salvar Alterações</button>
    </form>
    <br>
    <a href="{{ url_for('listar_funcionarios') }}">Cancelar</a>
{% endblock %}
