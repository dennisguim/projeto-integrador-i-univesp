<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=z, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <!-- fonte -->
     <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- adicionar link css -->
     <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}">
</head>
<body>
    <header>
        <div class="container header-content">
            <img src="{{ url_for('static', filename='logo_inca.jpg') }}" alt="Logo INCA" class="logo">
            <div class="header-titles">
                <h1>Sistema de Controle de Frequência</h1>
                <p>Instituto Nacional de Câncer</p>
            </div>
        </div>
    </header>

    <main>
        <!-- O conteudo principal de cada página será inserido aqui -->
         {% block content %}{% endblock %}
    </main>
    
    <footer>
        <p>&copy; 2026 - Projeto Integrador - Univesp</p>
    </footer>
</body>
</html>
