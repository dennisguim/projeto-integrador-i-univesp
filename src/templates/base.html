<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - Sistema INCA</title>
    
    <!-- Fonte Roboto (Material Design) -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Nosso CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>
    
    <div class="accessibility-bar" role="complementary" aria-label="Acessibilidade">
        <div class="container">
            <button id="increase-font" title="Aumentar Fonte">A+</button>
            <button id="decrease-font" title="Diminuir Fonte">A-</button>
            <button id="reset-font" title="Resetar Fonte">A</button>
            <button id="toggle-contrast" title="Alternar Alto Contraste">Contraste</button>
        </div>
    </div>

    <header role="banner">
        <div class="container header-content">
            <img src="{{ url_for('static', filename='logo_inca.jpg') }}" alt="Logo do Instituto Nacional de Câncer (INCA)" class="logo">
            <div class="header-titles">
                <h1>Sistema de Controle de Frequência</h1>
                <p>Instituto Nacional de Câncer</p>
            </div>
        </div>
    </header>
    
    <main class="container" id="main-content" role="main">
        <!-- O conteúdo principal de cada página será inserido aqui -->
        {% block content %}{% endblock %}
    </main>

    <footer role="contentinfo">
        <p>&copy; 2026 - Projeto Integrador em Computação</p>
    </footer>

    <!-- VLibras Widget para Acessibilidade de Surdos -->
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>

    <!-- Script de Acessibilidade Personalizado -->
    <script src="{{ url_for('static', filename='accessibility.js') }}"></script>
</body>
</html>
